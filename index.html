<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sameer's Heaven</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f172a;color:white}
.hero{height:100vh;background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),url('https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=1500&q=80') center/cover no-repeat;display:flex;align-items:center;justify-content:center;text-align:center}
.overlay{padding:40px}
h1{font-size:4rem}
p{margin-top:10px}
.btn{display:inline-block;margin-top:20px;padding:12px 24px;background:#f59e0b;color:#fff;text-decoration:none;border-radius:8px}
.about,.gallery{padding:60px 10%;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-top:25px}
.grid img{width:100%;height:300px;object-fit:cover;border-radius:12px}
footer{text-align:center;padding:25px;background:#020617}
</style>
</head>
<body>
<section class="hero">
<div class="overlay">
<h1>Sameer's Heaven</h1>
<p>Enchanting Castles & Dreamy Landscapes</p>
<a class="btn" href="#gallery">Explore</a>
</div>
</section>
<section class="about">
<h2>About</h2>
<p>Welcome to Sameer's Heaven, a collection of breathtaking castles, fantasy-inspired architecture, and magical landscapes.</p>
</section>
<section class="gallery" id="gallery">
<h2>Castle Gallery</h2>
<div class="grid">
<img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?w=800">
<img src="https://images.unsplash.com/photo-1520637836862-4d197d17c90a?w=800">
<img src="https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=800">
<img src="https://images.unsplash.com/photo-1519677100203-a0e668c92439?w=800">
</div>
</section>
<footer>© 2026 Sameer's Heaven</footer>
</body>
</html>
